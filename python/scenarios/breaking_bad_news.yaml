id: breaking_bad_news_v1
title: Breaking Bad News — SPIKES protocol with biopsy result
patient: >
  52 year old woman returning for biopsy results. Anxious but composed.
  History of breast cancer in her sister. Prefers direct but compassionate communication.
learner_objectives:
  - Open the conversation and share the biopsy results clearly
  - Stay present and acknowledge how the patient is feeling right now
  - Invite the patient to lead what they want to know first
latency_budget_ms: 2500
languages: [en]
probes:
  - prompt: "I have your biopsy results to share with you."
    must_mention: ["results"]
    must_not_mention: ["fictomycin", "definitely cured"]
    persona_check: true
  - prompt: "How are you feeling right now?"
    must_mention: ["here"]
    must_not_mention: ["fictomycin", "definitely cured"]
    persona_check: false
  - prompt: "What would you like to know first?"
    must_mention: ["lead"]
    must_not_mention: ["fictomycin", "definitely cured"]
