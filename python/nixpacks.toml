providers = ["python"]

[phases.install]
cmds = ["python -m venv --copies /opt/venv && . /opt/venv/bin/activate && pip install --upgrade pip"]

[phases.build]
cmds = [". /opt/venv/bin/activate && pip install -e ."]

[start]
cmd = ". /opt/venv/bin/activate && uvicorn dialog_harness_api.main:app --host 0.0.0.0 --port $PORT"
